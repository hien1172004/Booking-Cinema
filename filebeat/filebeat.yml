# Bỏ qua kiểm tra quyền file (Cần thiết khi chạy trên Windows Docker)
setup.strict.perms: false

filebeat.inputs:
  - type: filestream
    id: cinema-booking-logs
    enabled: true
    paths:
      - /usr/share/cinema/logs/*.log
    fields:
      service: cinema-booking
      environment: dev
    fields_under_root: true
    parsers:
      - multiline:
          type: pattern
          pattern: '^\d{4}-\d{2}-\d{2}'
          negate: true
          match: after

  # Đọc log từ Docker containers (Vô hiệu hóa để tránh lỗi trên Windows)
  - type: container
    enabled: false
    paths:
      - /var/lib/docker/containers/*/*.log

output.logstash:
  hosts: ["logstash:5044"]
  worker: 1
  backoff.max: 15s

# Logging của chính Filebeat
logging.level: warning
logging.to_files: false
