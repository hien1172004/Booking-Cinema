filebeat.inputs:
  # Đọc từ file log của Spring Boot app
  - type: log
    enabled: true
    paths:
      - /usr/share/cinema/logs/*.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      service: cinema-booking
      environment: dev
    fields_under_root: true
    multiline.pattern: '^\d{4}-\d{2}-\d{2}'
    multiline.negate: true
    multiline.match: after

  # Đọc log từ Docker containers (optional)
  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

output.logstash:
  hosts: ["logstash:5044"]

# Logging của chính Filebeat
logging.level: warning
logging.to_files: false
