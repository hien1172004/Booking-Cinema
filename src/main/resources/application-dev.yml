spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  cache:
    type: redis
  ai:
    retry:
      exclude-on-http-codes: 429
    openai:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      chat:
        enabled: ${APP_AI_ENABLED:false}
        options:
          model: ${GEMINI_MODEL:gemini-2.0-flash}
          temperature: 0.7
      embedding:
        enabled: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: update   # dev: update | prod: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 3600
  refreshable-duration: 86400

server:
  port: 8081

app:
  frontend-url: http://localhost:3000
  ai:
    enabled: ${APP_AI_ENABLED:false}
  chat-memory:
    ttl: ${CHAT_MEMORY_TTL:PT24H}

vnpay:
  tmn-code: ${TMN_CODE}
  hash-secret: ${TMN_KEY}
  payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${NGROK_URL}/api/v1/payments/vnpay/return
  ipn-url: ${NGROK_URL}/api/v1/payments/vnpay/ipn
  app-return-url: cinema-booking://payment-return
  version: "2.1.0"
  command: pay
  currency-code: VND
  locale: vn

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    doc-expansion: none
    display-request-duration: true
    try-it-out-enabled: true
    persistAuthorization: true
    filter: true
logging:
  logstash:
    host: ${LOGGING_LOGSTASH_HOST:logstash}
    port: ${LOGGING_LOGSTASH_PORT:5000}