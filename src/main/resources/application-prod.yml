spring:
  datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}

  jpa:
      hibernate:
        ddl-auto: validate
      show-sql: false

  ai:
    retry:
      exclude-on-http-codes: 429
    openai:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      chat:
        enabled: ${APP_AI_ENABLED:false}
        options:
          model: ${GEMINI_MODEL:gemini-2.0-flash}
          temperature: 0.7
      embedding:
        enabled: false

  data:
    redis:
      repositories:
        enabled: false

app:
  ai:
    enabled: ${APP_AI_ENABLED:false}
  chat-memory:
    ttl: ${CHAT_MEMORY_TTL:PT24H}

