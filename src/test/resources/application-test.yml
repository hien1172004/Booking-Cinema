spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
  h2:
    console:
      enabled: true
  redis:
    host: localhost
    port: 6379
  mail:
    host: localhost
jwt:
  signerKey: test-key-64-chars-long-for-jwt-signing-in-tests-only
app:
  frontend-url: http://localhost
vnpay:
  payment-url: http://localhost
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
springdoc:
  swagger-ui:
    enabled: false
